name: Auto Release (GLPI 11 / main)

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update apt
        run: sudo apt-get update -y

      - name: Install XML and gettext tools
        run: sudo apt-get install -y libxml2-utils gettext

      - name: Locale compilation .po to .mo
        run: |
          if [ -d "locales" ]; then
            find locales -type f -name "*.po" -exec bash -c 'msgfmt "$0" -o "${0%.po}.mo"' {} \;
            echo ".po to .mo"
          else
            echo "Locales folder not existing - omitting .po compilation."
          fi

      - name: Read GLPI 11 release version from roundrobin.xml
        id: get-version
        run: |
          VERSION=$(xmllint --xpath "string(/root/versions/version[compatibility='~11.0'][1]/num)" roundrobin.xml)
          if [ -z "$VERSION" ]; then
            echo "No ~11.0 version found in roundrobin.xml"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found GLPI 11 release version: $VERSION"

      - name: Verify version matches setup.php
        run: |
          PHP_VERSION=$(grep -oP "\\\$PLUGIN_ROUNDROBIN_VERSION = '\\K[^']+" inc/config.class.php)
          XML_VERSION="${{ steps.get-version.outputs.version }}"
          if [ "$PHP_VERSION" != "$XML_VERSION" ]; then
            echo "config.class.php version ($PHP_VERSION) != roundrobin.xml ($XML_VERSION)"
            exit 1
          fi

      - name: Prepare tar.gz
        run: |
          PLUGIN_NAME="roundrobin"
          mkdir -p /tmp/$PLUGIN_NAME
          cp -r . /tmp/$PLUGIN_NAME/
          rm -rf /tmp/$PLUGIN_NAME/.git /tmp/$PLUGIN_NAME/.github
          cd /tmp
          tar -czvf $PLUGIN_NAME-${{ steps.get-version.outputs.version }}.tar.gz $PLUGIN_NAME
          mv $PLUGIN_NAME-${{ steps.get-version.outputs.version }}.tar.gz $GITHUB_WORKSPACE/

      - name: Tag creation
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a ${{ steps.get-version.outputs.version }} -m "${{ steps.get-version.outputs.version }}"
          git push origin ${{ steps.get-version.outputs.version }}
        continue-on-error: true

      - name: Release creation
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          name: ${{ steps.get-version.outputs.version }}
          draft: false
          prerelease: false
          files: roundrobin-${{ steps.get-version.outputs.version }}.tar.gz
